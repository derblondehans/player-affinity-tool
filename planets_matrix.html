const { useState, useCallback } = React;

const PROXY = 'http://localhost:8765';

async function apiFetch(path) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 15000);
  try {
    const r = await fetch(PROXY + path, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();
    if (!text.trim()) throw new Error('Leere Antwort');
    return JSON.parse(text);
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

// ── Kollaborationsmatrix ─────────────────────────────────────────────────────
function Matrix({ players, sharedGames }) {
  const [hovered, setHovered] = useState(null);

  // Zellfarbe nach Anzahl gemeinsamer Spiele
  function cellColor(count) {
    if (count === 0) return '#0a0a1a';
    if (count === 1) return '#0d2a5a';
    if (count === 2) return '#1a3a7a';
    if (count <= 4)  return '#2a5aaa';
    return '#3a7aff';
  }

  function cellText(a, b, count) {
    if (a === b) return '—';
    if (count === 0) return '·';
    return count;
  }

  return (
    <div style={S.matrixWrap}>
      <table style={S.table}>
        <thead>
          <tr>
            <th style={{...S.th, background:'#060d1a'}}></th>
            {players.map(p => (
              <th key={p._key || p.username} style={{...S.th, maxWidth:80}}
                title={p.isDead ? `${p.username} (gestorben)` : p.username}>
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                  <div style={{...S.dot, background: p.isDead ? '#3a5a7a' : (RACE_COLORS[p.raceid] || '#4488ff')}}/>

                    {p.username}{p.isDead ? ' †' : ''}

                </div>
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {players.map(rowP => (
            <tr key={rowP.username}>
              <td style={{...S.thRow}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{...S.dot, background: RACE_COLORS[rowP.raceid] || '#4488ff'}}/>
                  {rowP.username}
                </div>
              </td>
              {players.map(colP => {
                const isDiag = rowP.username === colP.username;
                const key = [rowP.username, colP.username].sort().join('||');
                const count = isDiag ? null : (sharedGames[key] || []).length;
                const isHov = hovered === key && !isDiag;
                return (
                  <td
                    key={colP.username}
                    style={{
                      ...S.td,
                      background: isDiag ? '#1a1a2a' : (isHov ? '#3a7aff44' : cellColor(count)),

// ── Gemeinsame Spiele Details ────────────────────────────────────────────────
// Ermittelt Turn-Überschneidung zweier Spieler in einem Spiel
// anhand der players-Liste aus loadinfo
function getTurnOverlap(gameInfo, usernameA, usernameB) {
  if (!gameInfo || !gameInfo.players) return null;
  const players  = gameInfo.players;
  const events   = gameInfo.events || [];
  const gameTurn = (gameInfo.game || gameInfo).turn || 999;

  // Für einen Username alle Perioden (turnJoined→turnLeft) ermitteln
  // Berücksichtigt Replace-Spieler (mehrfacher Join/Drop)
  function getPeriodsForUser(username) {
    const periods = [];
    // Aus events: join/drop-Paare bauen
    const userEvents = events
      .filter(ev => {
        if (ev.eventtype !== 3 && ev.eventtype !== 10 && ev.eventtype !== 7) return false;
        const m = ev.description.match(/^(.+?) has (joined|been dropped|won)/);
        return m && m[1].trim() === username;
      })
      .sort((a, b) => a.turn - b.turn);

    let joinTurn = null;
    userEvents.forEach(ev => {
      const m = ev.description.match(/^(.+?) has (joined|been dropped)/);
      if (!m) return;
      if (m[2] === 'joined') {
        joinTurn = ev.turn;
      } else if (m[2] === 'been dropped' && joinTurn !== null) {
        periods.push({ from: joinTurn, to: ev.turn });
        joinTurn = null;
      }
    });
    // Noch aktiv (kein Drop-Event nach letztem Join)
    if (joinTurn !== null) {
      // Aus players-Array turnjoined + statusturn lesen als Fallback
      const pp = players.find(p => p.username === username);
      const to = (pp && pp.status !== 1) ? pp.statusturn : gameTurn;
      periods.push({ from: joinTurn, to });
    }

    // Fallback: aus players-Array direkt
    if (periods.length === 0) {
      const pp = players.find(p => p.username === username);
      if (pp) {
        periods.push({
          from: pp.turnjoined || 1,
          to: pp.status !== 1 ? pp.statusturn : gameTurn
        });
      }
    }
    return periods;
  }

  // Überschneidung zweier Perioden-Listen berechnen
  function overlap(periodsA, periodsB) {
    let minFrom = Infinity, maxTo = -Infinity;
    let found = false;
    periodsA.forEach(a => {
      periodsB.forEach(b => {
        const from = Math.max(a.from, b.from);
        const to   = Math.min(a.to,   b.to);
        if (from <= to) {
          minFrom = Math.min(minFrom, from);
          maxTo   = Math.max(maxTo,   to);
          found   = true;
        }
      });
    });
    return found ? { from: minFrom, to: maxTo } : null;
  }

  const periodsA = getPeriodsForUser(usernameA);
  const periodsB = getPeriodsForUser(usernameB);
  return overlap(periodsA, periodsB);
}

function SharedGamesDetail({ players, sharedGames, sourceGame, gameInfoCache, setGameInfoCache }) {
  const [loading, setLoading] = useState({});

  // Lädt gameInfo für ein Spiel falls noch nicht gecacht
  const ensureGameInfo = async (gameId) => {
    if (gameInfoCache[gameId]) return;
    setLoading(prev => ({...prev, [gameId]: true}));
    try {
      const info = await apiFetch(`/game/loadinfo?gameid=${gameId}`);
      setGameInfoCache(prev => ({...prev, [gameId]: info}));
    } catch(e) {
      setGameInfoCache(prev => ({...prev, [gameId]: null}));
    }
    setLoading(prev => ({...prev, [gameId]: false}));
  };

  // Alle gemeinsamen Spiele beim ersten Render laden
  React.useEffect(() => {
    const allGameIds = new Set();
    Object.values(sharedGames).forEach(games =>
      games.forEach(g => allGameIds.add(g.id))
    );
    allGameIds.forEach(id => ensureGameInfo(id));
  }, [sharedGames]);

  const pairs = [];
  for (let i = 0; i < players.length; i++) {
    for (let j = i + 1; j < players.length; j++) {
      const a = players[i], b = players[j];
      const key = [a.username, b.username].sort().join('||');
      const games = sharedGames[key] || [];
      const otherGames = games.filter(g => g.id !== sourceGame.id);
      if (otherGames.length > 0) pairs.push({ a, b, games: otherGames });
    }
  }

  if (pairs.length === 0) {
    return (
      <div style={{color:'#2a4a7a',fontSize:11,letterSpacing:1,padding:'1rem 0'}}>
        // keine weiteren gemeinsamen Spiele gefunden
      </div>
    );
  }

  pairs.sort((x, y) => y.games.length - x.games.length);

  return (
    <div>
      {pairs.map(({ a, b, games }) => (
        <div key={`${a.username}||${b.username}`} style={{
          background:'#060d1a', border:'0.5px solid #1a3a6a',
          borderRadius:4, padding:'0.75rem 1rem', marginBottom:'0.5rem'
        }}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <div style={{...S.dot, background: a.isDead ? '#3a5a7a' : (RACE_COLORS[a.raceid]||'#4488ff')}}/>
            <span style={{color: a.isDead?'#5a7a9a':'#a0c8f0',fontSize:12}}>{a.username}{a.isDead?' †':''}</span>
            <span style={{color:'#2a4a7a',fontSize:11}}>↔</span>
            <div style={{...S.dot, background: b.isDead ? '#3a5a7a' : (RACE_COLORS[b.raceid]||'#4488ff')}}/>
            <span style={{color: b.isDead?'#5a7a9a':'#a0c8f0',fontSize:12}}>{b.username}{b.isDead?' †':''}</span>
            <span style={{marginLeft:'auto',color:'#3a7aff',fontSize:11,letterSpacing:1}}>
              {games.length} gemeinsame{games.length===1?'s':''} Spiel{games.length===1?'':'e'}
            </span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {games.map(g => {
              const info    = gameInfoCache[g.id];
              const isLoad  = loading[g.id];
              const overlap = info ? getTurnOverlap(info, a.username, b.username) : null;
              return (
                <div key={g.id} style={{
                  background:'#0a0f20', border:'0.5px solid #1a3a6a',
                  borderRadius:4, padding:'6px 10px',
                  display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'
                }}>
                  {/* Spielname + ID */}
                  <div style={{display:'inline-flex',alignItems:'center',gap:5,flex:1,minWidth:120}}>
                    <span style={{fontSize:11,color:'#6ab0ff',letterSpacing:0.5}}>{g.name}</span>
                    <span style={{
                      color:'#3a5a9a', fontSize:9, letterSpacing:1,
                      borderLeft:'0.5px solid #2a4a7a', paddingLeft:5
                    }}>#{g.id}</span>
                  </div>
                  {/* Turn-Überschneidung */}
                  {isLoad && (
                    <span style={{fontSize:10,color:'#2a4a7a',letterSpacing:1}}>laden...</span>
                  )}
                  {!isLoad && overlap && (
                    <span style={{
                      fontSize:10, letterSpacing:1,
                      color: overlap.from === overlap.to ? '#ffaa3a' : '#4acca0'
                    }}>
                      Turn {overlap.from} – {overlap.to}
                      <span style={{color:'#2a4a7a',marginLeft:6}}>
                        ({overlap.to - overlap.from + 1} Turns)
                      </span>
                    </span>
                  )}
                  {!isLoad && info && !overlap && (
                    <span style={{fontSize:10,color:'#3a5a7a',letterSpacing:1}}>keine Überschneidung</span>
                  )}
                  {!isLoad && info === null && (
                    <span style={{fontSize:10,color:'#7a3a3a',letterSpacing:1}}>Infos nicht verfügbar</span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Haupt-App ────────────────────────────────────────────────────────────────
function App() {
  const [gameId, setGameId]         = useState('');
  const [loading, setLoading]       = useState(false);
  const [progress, setProgress]     = useState('');
  const [error, setError]           = useState('');
  const [sourceGame, setSourceGame] = useState(null);
  const [players, setPlayers]       = useState([]);
  const [sharedGames, setSharedGames] = useState({});  // key: "a||b" → [game, ...]
  const [activeTab, setActiveTab]   = useState('matrix');
  const [gameInfoCache, setGameInfoCache] = useState({});  // gameid → {players:[]}

  const analyze = useCallback(async () => {
    if (!gameId.trim()) return;
    setLoading(true);
    setError('');
    setProgress('');
    setSourceGame(null);
    setPlayers([]);
    setSharedGames({});

    try {
      // 1. Spielinfo laden
      setProgress(`Lade Spielinfo für Game ${gameId}...`);
      const info = await apiFetch(`/game/loadinfo?gameid=${gameId.trim()}`);
      if (info.success === false) throw new Error(info.error || 'Spiel nicht gefunden');

      const game = info.game || info;
      const rawPlayers = info.players || [];
      const events    = info.events  || [];

      if (rawPlayers.length === 0) throw new Error('Keine Spieler in diesem Spiel gefunden');

      // 2. Echte Usernamen aus Events ermitteln (für tote Spieler)
      // eventtype 3 = Join, 10 = Drop. Der Username steht im description-Text.
      // Format: "username has joined the game in slot X as Race"
      // Wir bauen eine Map: slotId (playerid) → Set von echten Usernamen
      const slotUsers = {};  // playerid → Set<username>
      events.forEach(ev => {
        if (ev.eventtype === 3 || ev.eventtype === 10) {
          // Username ist vor " has " im description
          const match = ev.description.match(/^(.+?) has (joined|been dropped)/);
          if (match && ev.playerid > 0) {
            const uname = match[1].trim();
            if (!slotUsers[ev.playerid]) slotUsers[ev.playerid] = new Set();
            slotUsers[ev.playerid].add(uname);
          }
        }
      });

      // 3. Spielerliste aufbauen — tote Spieler mit echtem Namen ergänzen
      // Ein Slot kann mehrere Spieler haben (Replace-Spieler) → alle einbeziehen
      const allPlayers = [];
      rawPlayers.forEach(p => {
        if (p.username !== 'dead' && p.isregistered) {
          // Lebender Spieler: direkt übernehmen
          allPlayers.push({ ...p, isDead: false, slotid: p.id });
        } else {
          // Toter/erloschener Slot: alle echten Usernamen aus Events holen
          const users = slotUsers[p.id] ? [...slotUsers[p.id]] : [];
          users.forEach(uname => {
            allPlayers.push({
              ...p,
              username: uname,
              isDead: true,
              slotid: p.id,
              // Eindeutiger Key für React
              _key: `${p.id}_${uname}`,
            });
          });
        }
      });

      // Duplikate entfernen (gleicher Username kann in zwei Slots aufgetaucht sein)
      const seen = new Set();
      const uniquePlayers = allPlayers.filter(p => {
        if (seen.has(p.username)) return false;
        seen.add(p.username);
        return true;
      });

      setSourceGame(game);
      setProgress(`${uniquePlayers.length} Spieler gefunden (inkl. tote). Lade Spielhistorie...`);

      // 4. Für jeden Spieler alle seine Spiele laden
      const playerGames = {};
      let done = 0;

      await Promise.all(uniquePlayers.map(async (p) => {
        try {
          const data = await apiFetch(
            `/games/list?username=${encodeURIComponent(p.username)}&status=2,3`
          );
          const games = Array.isArray(data) ? data : (data.games || []);
          playerGames[p.username] = games;
        } catch(e) {
          playerGames[p.username] = [];
        }
        done++;
        setProgress(`Spielhistorie: ${done}/${uniquePlayers.length} Spieler geladen...`);
      }));

      // 5. Gemeinsame Spiele berechnen
      setProgress('Berechne Kollaborationsmatrix...');
      const matrix = {};

      for (let i = 0; i < uniquePlayers.length; i++) {
        for (let j = i + 1; j < uniquePlayers.length; j++) {
          const a = uniquePlayers[i], b = uniquePlayers[j];
          const key = [a.username, b.username].sort().join('||');

          const gamesA = new Map((playerGames[a.username] || []).map(g => [g.id, g]));
          const shared = (playerGames[b.username] || []).filter(g => gamesA.has(g.id));
          matrix[key] = shared;
        }
      }

      setPlayers(uniquePlayers);
      setGameInfoCache({});  // wird lazy befüllt beim Anzeigen
      setSharedGames(matrix);
      setProgress('');

    } catch(e) {
      setError(e.message);
      setProgress('');
    } finally {
      setLoading(false);
    }
  }, [gameId]);

  // Statistiken
  const totalPairs = players.length * (players.length - 1) / 2;
  const activePairs = Object.values(sharedGames).filter(g => g.length > 1).length;
  const maxShared = Math.max(0, ...Object.values(sharedGames).map(g => g.length));
  const totalConnections = Object.values(sharedGames).filter(g => g.length > 0).length;

  return (
    <div>
      {/* Header */}
      <div style={S.header}>
        <div style={S.logoIcon}>✦</div>
        <div>
          <div style={S.logoText}>Planets.nu</div>
          <div style={S.logoSub}>kollaborationsanalyse</div>
          <div style={{fontSize:9, color:'#2a4a6a', letterSpacing:2, marginTop:2}}>v1.1</div>
        </div>
      </div>

      {/* Eingabe */}
      <div style={S.card}>
        <div style={S.sectionTitle}>// spiel analysieren</div>
        <div style={{display:'flex', gap:'1rem', alignItems:'flex-end', flexWrap:'wrap'}}>
          <div style={{flex:1, minWidth:200}}>
            <label style={S.label}>Game ID</label>
            <input
              style={S.input}
              type="number"
              placeholder="z.B. 673864"
              value={gameId}
              onChange={e => setGameId(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && !loading && analyze()}
              disabled={loading}
            />
          </div>
          <button
            style={{...S.btn, ...(loading ? S.btnDisabled : {})}}
            onClick={analyze}
            disabled={loading}
          >
            {loading ? '[ analysiere... ]' : '[ analysieren ]'}
          </button>
        </div>
        {error   && <div style={S.error}>FEHLER: {error}</div>}
        {progress && <div style={S.progress}>// {progress}</div>}
        <div style={{marginTop:'0.75rem',fontSize:10,color:'#2a4a7a',letterSpacing:1}}>
          Öffentlicher Endpunkt · kein Login erforderlich · Proxy muss laufen (localhost:8765)
        </div>
      </div>

      {/* Ergebnisse */}
      {players.length > 0 && sourceGame && (
        <>
          {/* Spielinfo */}
          <div style={{...S.card, borderColor:'#3a7aff44'}}>
            <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:'1rem'}}>
              <div style={{fontSize:16, color:'#6ab0ff', letterSpacing:2}}>
                {sourceGame.name || `Game ${gameId}`}
              </div>
              <span style={{
                background:'#0d2a5a', border:'0.5px solid #3a7aff55',
                borderRadius:20, padding:'2px 10px', fontSize:10,
                color:'#6ab0ff', letterSpacing:1
              }}>
                {sourceGame.status === 2 ? 'Running' : sourceGame.status === 3 ? 'Finished' : '?'}
              </span>
            </div>
            <div style={S.statGrid}>
              <div style={S.statCard}>
                <div style={S.statLabel}>Spieler</div>
                <div style={S.statValue}>{players.length}</div>
              </div>
              <div style={S.statCard}>
                <div style={S.statLabel}>Verbindungen</div>
                <div style={{...S.statValue, color:'#4acca0'}}>{totalConnections}</div>
              </div>
              <div style={S.statCard}>
                <div style={S.statLabel}>Mehrfach gespielt</div>
                <div style={{...S.statValue, color:'#ffaa3a'}}>{activePairs}</div>
              </div>
              <div style={S.statCard}>
                <div style={S.statLabel}>Max. Spiele</div>
                <div style={S.statValue}>{maxShared}</div>
              </div>
            </div>

            {/* Spielerliste */}
            <div style={S.sectionTitle}>// spieler in diesem spiel</div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:4}}>
              {players.map(p => (
                <div key={p._key || p.username} style={S.playerRow}>
                  <div style={{...S.dot, background: p.isDead ? '#3a5a7a' : (RACE_COLORS[p.raceid]||'#4488ff')}}/>
                  <span style={{color: p.isDead ? '#5a7a9a' : '#a0c8f0'}}>
                    {p.username}
                  </span>
                  {p.isDead && <span style={{fontSize:9,color:'#3a5a7a',letterSpacing:1,marginLeft:'auto'}}>†</span>}
                  <span style={{color:'#2a4a7a',fontSize:10,marginLeft:'auto'}}>
                    {RACES[p.raceid] || `Race ${p.raceid}`}
                  </span>
                </div>
              ))}
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:'flex', gap:8, marginBottom:'1rem'}}>
            {[['matrix','Kollaborationsmatrix'],['detail','Gemeinsame Spiele']].map(([id,label]) => (
              <button
                key={id}
                style={{
                  ...S.btn, marginTop:0,
                  ...(activeTab===id ? {background:'#1a3a7a', color:'#a0d0ff', borderColor:'#6ab0ff'} : {})
                }}
                onClick={() => setActiveTab(id)}
              >
                {label}
              </button>
            ))}
          </div>

          {/* Matrix */}
          {activeTab === 'matrix' && (
            <div style={S.card}>
              <div style={S.sectionTitle}>// kollaborationsmatrix</div>
              <div style={{fontSize:10,color:'#3a6a9a',marginBottom:'1rem',letterSpacing:1}}>
                Zellfarbe: dunkel = wenige, hell = viele gemeinsame Spiele
              </div>
              <div style={{fontSize:10,color:'#3a5a7a',marginBottom:'1rem',letterSpacing:1}}>
                † = Spieler ist in diesem Spiel gestorben oder wurde ersetzt
              </div>
              <div style={{display:'flex',gap:12,marginBottom:'1rem',flexWrap:'wrap'}}>
                {[
                  ['#0a0a1a','0 Spiele'],
                  ['#0d2a5a','1 Spiel'],
                  ['#1a3a7a','2 Spiele'],
                  ['#2a5aaa','3–4 Spiele'],
                  ['#3a7aff','5+ Spiele'],
                ].map(([color, label]) => (
                  <div key={label} style={{display:'flex',alignItems:'center',gap:6,fontSize:10,color:'#3a6a9a'}}>
                    <div style={{width:14,height:14,borderRadius:2,background:color,border:'0.5px solid #2a4a7a'}}/>
                    {label}
                  </div>
                ))}
              </div>
              <Matrix players={players} sharedGames={sharedGames} />
            </div>
          )}

          {/* Detail */}
          {activeTab === 'detail' && (
            <div style={S.card}>
              <div style={S.sectionTitle}>// gemeinsame spiele (außer ausgangsspiel)</div>
              <SharedGamesDetail
                players={players}
                sharedGames={sharedGames}
                sourceGame={sourceGame}
                gameInfoCache={gameInfoCache}
                setGameInfoCache={setGameInfoCache}
              />
            </div>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
